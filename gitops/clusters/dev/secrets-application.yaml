# Development secrets Application — ExternalSecrets (SEC-05) via secrets-chart.
# Deploy AFTER ESO + ClusterSecretStore Ready; BEFORE or with the main app chart.
#
# metadata.name is unique in argocd; releaseName stays techx-corp-secrets so the
# existing Helm release in techx-corp-dev is adopted (same pattern as prod).
# Tracking: Argo injects argocd.argoproj.io/instance=<metadata.name>.
# Primary rollback: git revert → merge → Argo auto-syncs.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: techx-corp-secrets-dev
  namespace: argocd
spec:
  project: techx-corp-dev

  source:
    repoURL: https://github.com/tmcmanhcuong/tf2-corp-chart.git
    targetRevision: techx-dev-corp
    path: secrets-chart
    helm:
      valueFiles:
        - values.yaml
        - values-dev.yaml
      releaseName: techx-corp-secrets

  destination:
    server: https://kubernetes.default.svc
    namespace: techx-corp-dev

  syncPolicy:
    automated:
      prune: false
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      # Do NOT enable ServerSideApply in v1 baseline.
    retry:
      limit: 3
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
# Change trail: @hungxqt - 2026-07-15 - Argo Application for development secrets-chart auto-sync.
