# Development Application — automated sync + self-heal + prune; NO ServerSideApply.
#
# Primary rollback: git revert → merge → Argo auto-syncs.
# History rollback: break-glass only (disable auto-sync first; then update Git).
#
# Tracking: Argo injects label argocd.argoproj.io/instance=<metadata.name>
# on every managed object. Adopting an existing Helm release shows OutOfSync
# for that label alone until the first sync stamps it. Expected; do not
# ignoreDifferences on this label.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: techx-corp-dev
  namespace: argocd
  # finalizer optional; avoid cascade-delete surprises during early rollout
spec:
  project: techx-corp-dev

  source:
    # Override if repo path differs; must match AppProject sourceRepos.
    repoURL: https://github.com/tmcmanhcuong/tf2-corp-chart.git
    targetRevision: techx-dev-corp
    path: .
    helm:
      valueFiles:
        - values.yaml
        - values-public-alb.yaml
        - values-dev.yaml
        - values-accounting.yaml
        - values-ad.yaml
        - values-cart.yaml
        - values-checkout.yaml
        - values-currency.yaml
        - values-email.yaml
        - values-flagd-ui.yaml
        - values-fraud-detection.yaml
        - values-frontend.yaml
        - values-frontend-proxy.yaml
        - values-image-provider.yaml
        - values-kafka.yaml
        - values-llm.yaml
        - values-load-generator.yaml
        - values-mem0.yaml
        - values-opensearch.yaml
        - values-payment.yaml
        - values-product-catalog.yaml
        - values-product-reviews.yaml
        - values-quote.yaml
        - values-recommendation.yaml
        - values-shipping.yaml
        - values-shopping-copilot.yaml
      # releaseName = Helm Release.Name (app.kubernetes.io/instance on subcharts).
      # Argo tracking label uses metadata.name above, not releaseName.
      releaseName: techx-corp-dev

  destination:
    server: https://kubernetes.default.svc
    namespace: techx-corp-dev

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      # Do NOT enable ServerSideApply in v1 baseline.
    retry:
      limit: 3
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m

  # Ignore noisy fields if needed after first diff (add only with evidence).
  # ignoreDifferences: []

