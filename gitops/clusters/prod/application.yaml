# Production Application — automated sync + self-heal + prune; NO ServerSideApply.
# Protect ALL prod-affecting paths in GitHub (not only values-prod.yaml):
#   templates/**, charts/**, Chart.yaml, Chart.lock, values.yaml,
#   values-prod.yaml, values-public-alb.yaml, gitops/clusters/prod/**, postgresql/**
#
# Prefer SEC-05 (ESO) before production GitOps cutover for secrets.
# Primary rollback: git revert → merge → Argo auto-syncs.
# History rollback: break-glass only (disable auto-sync first; then update Git).
# prune: true removes live objects no longer in the rendered manifest (e.g. in-cluster
# kafka after MSK cutover). Secrets Application stays prune: false.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: techx-corp
  namespace: argocd
spec:
  project: techx-corp

  source:
    repoURL: https://github.com/tf2-team/tf2-corp-chart.git
    targetRevision: main
    path: .
    helm:
      valueFiles:
        - values.yaml
        - values-public-alb.yaml
        - values-prod.yaml
        - values-accounting.yaml
        - values-ad.yaml
        - values-cart.yaml
        - values-checkout.yaml
        - values-currency.yaml
        - values-email.yaml
        - values-flagd-ui.yaml
        - values-fraud-detection.yaml
        - values-frontend.yaml
        - values-frontend-proxy.yaml
        - values-image-provider.yaml
        - values-kafka.yaml
        - values-llm.yaml
        - values-load-generator.yaml
        - values-mem0.yaml
        - values-opensearch.yaml
        - values-payment.yaml
        - values-product-catalog.yaml
        - values-product-reviews.yaml
        - values-quote.yaml
        - values-recommendation.yaml
        - values-shipping.yaml
        - values-shopping-copilot.yaml
      releaseName: techx-corp

  destination:
    server: https://kubernetes.default.svc
    namespace: techx-corp-prod

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      # Do NOT enable ServerSideApply in v1 baseline.
    retry:
      limit: 3
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
# Change trail: @hungxqt - 2026-07-16 - Enable automated prune on production app chart Application.
